<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brands We Repair</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="brands-section">
        <header class="brands-header">
            <h1>REPAIR OF EQUIPMENT FROM VARIOUS BRANDS</h1>
        </header>

        <input type="checkbox" id="brand-toggle" class="brand-checkbox">

        <div class="swiper brand-slider">
            <div class="swiper-wrapper brand-container" id="brand-grid">
                
                <div class="swiper-slide brand-card">
                    <img src="img/lenovo.png" alt="Lenovo" class="brand-logo">
                    <button class="brand-details"><img src="img/go-icon.png" alt="Go"></button>
                </div>
                <div class="swiper-slide brand-card"><img src="img/samsung.png" alt="Samsung"><button class="brand-details"><img src="img/go-icon.png"></button></div>
                <div class="swiper-slide brand-card"><img src="img/apple.png" alt="Apple"><button class="brand-details"><img src="img/go-icon.png"></button></div>
                <div class="swiper-slide brand-card"><img src="img/viewsonic.png" alt="Viewsonic"><button class="brand-details"><img src="img/go-icon.png"></button></div>
                <div class="swiper-slide brand-card"><img src="img/bosch.png" alt="Bosch"><button class="brand-details"><img src="img/go-icon.png"></button></div>
                <div class="swiper-slide brand-card"><img src="img/hp.png" alt="HP"><button class="brand-details"><img src="img/go-icon.png"></button></div>
                <div class="swiper-slide brand-card"><img src="img/acer.png" alt="Acer"><button class="brand-details"><img src="img/go-icon.png"></button></div>
                <div class="swiper-slide brand-card"><img src="img/sony.png" alt="Sony"><button class="brand-details"><img src="img/go-icon.png"></button></div>
                <div class="swiper-slide brand-card"><img src="img/lenovo.png" alt="Lenovo"><button class="brand-details"><img src="img/go-icon.png"></button></div>
                <div class="swiper-slide brand-card"><img src="img/samsung.png" alt="Samsung"><button class="brand-details"><img src="img/go-icon.png"></button></div>
                <div class="swiper-slide brand-card"><img src="img/apple.png" alt="Apple"><button class="brand-details"><img src="img/go-icon.png"></button></div>

            </div>
            <div class="swiper-pagination"></div>
        </div>

        <label for="brand-toggle" class="expand-button">
            <span class="expand-icon"></span>
            <span class="expand-text show-text"><img src="img/show-all.png" alt="Show" class="show-text-icon">Show all</span>
            <span class="expand-text hide-text"><img src="img/hide-all.png" alt="Hide" class="hide-text-icon">Hide</span>
        </label>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
